<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="chateaud의 프로젝트와 작업을 소개하는 포트폴리오입니다."
    />
    <title>chateaud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-shell" aria-label="주요 메뉴">
        <a class="wordmark" href="#top" aria-label="chateaud 홈">chateaud.</a>
        <div class="nav-links">
          <a href="#projects">프로젝트</a>
          <a href="#about">소개</a>
        </div>
        <a class="nav-contact" href="mailto:hello@example.com">Contact</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <p class="hero-eyebrow reveal">Portfolio · 2026</p>
        <h1 id="hero-title" class="reveal">
          생각을 도구로,<br />
          <span>복잡함을 단순하게.</span>
        </h1>
        <p class="hero-description reveal">
          일상의 불편을 발견하고, 오래 쓰고 싶은 디지털 경험으로 만듭니다.
        </p>
        <a class="hero-link reveal" href="#projects">
          프로젝트 둘러보기 <span aria-hidden="true">↓</span>
        </a>
        <div class="hero-orb orb-one" aria-hidden="true"></div>
        <div class="hero-orb orb-two" aria-hidden="true"></div>
      </section>

      <section class="project-section" id="projects" aria-labelledby="projects-title">
        <div class="section-heading">
          <p>Selected work</p>
          <h2 id="projects-title">만든 것들.</h2>
        </div>
        <div class="project-list" id="projectList"></div>
      </section>

      <section class="about-section" id="about" aria-labelledby="about-title">
        <div>
          <p class="about-label">About</p>
          <h2 id="about-title">필요한 것을 직접 만듭니다.</h2>
        </div>
        <p class="about-copy">
          작은 계산기부터 복잡한 업무 시스템까지, 실제로 사용하는 사람의 흐름을
          먼저 생각합니다. 분명한 구조와 편안한 인터페이스를 좋아합니다.
        </p>
      </section>
    </main>

    <footer>
      <span>© 2026 chateaud</span>
      <a href="#top">맨 위로 ↑</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
